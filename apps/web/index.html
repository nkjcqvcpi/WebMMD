<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>WebMMD 0.1.0 — Model Viewer & Inspector</title>

    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      window.errors = [];
      window.consoleLogs = [];
      window.addEventListener("error", function (e) {
        window.errors.push({
          type: "error",
          message: e.message,
          filename: e.filename,
          lineno: e.lineno,
          colno: e.colno,
        });
      });
      window.addEventListener("unhandledrejection", function (e) {
        window.errors.push({
          type: "unhandledrejection",
          message: e.reason
            ? e.reason.message || String(e.reason)
            : "Unhandled rejection",
        });
      });

      const originalLog = console.log;
      console.log = function () {
        originalLog.apply(console, arguments);
        window.consoleLogs.push({
          type: "log",
          message: Array.from(arguments)
            .map((arg) => {
              try {
                return typeof arg === "object"
                  ? JSON.stringify(arg)
                  : String(arg);
              } catch (e) {
                return String(arg);
              }
            })
            .join(" "),
        });
      };

      const originalWarn = console.warn;
      console.warn = function () {
        originalWarn.apply(console, arguments);
        window.consoleLogs.push({
          type: "warn",
          message: Array.from(arguments)
            .map((arg) => {
              try {
                return typeof arg === "object"
                  ? JSON.stringify(arg)
                  : String(arg);
              } catch (e) {
                return String(arg);
              }
            })
            .join(" "),
        });
      };

      const originalError = console.error;
      console.error = function () {
        originalError.apply(console, arguments);
        const msg = Array.from(arguments)
          .map((arg) => {
            try {
              return typeof arg === "object"
                ? JSON.stringify(arg)
                : String(arg);
            } catch (e) {
              return String(arg);
            }
          })
          .join(" ");
        window.errors.push({ type: "console-error", message: msg });
        window.consoleLogs.push({ type: "error", message: msg });
      };
    </script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0b0b0f;
        color: #f8fafc;
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        overflow: hidden;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <webmmd-app-shell></webmmd-app-shell>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
